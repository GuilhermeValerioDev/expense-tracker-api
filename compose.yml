services:
  api:
    build: .

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: bism
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: expense_tracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: